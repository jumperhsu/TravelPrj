<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>專案管理系統 | 編輯模式</title>
    <!-- Firebase SDKs (Realtime Database) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', sans-serif;
            background: #f5f7fb;
            min-height: 100vh;
            padding: 30px 20px;
        }
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .panel {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            padding: 28px 32px;
            margin-bottom: 28px;
            border: 1px solid rgba(255,255,255,0.5);
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 28px;
            padding-bottom: 18px;
            border-bottom: 2px solid #eef2fa;
        }
        h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1f3a6b, #2b4c8a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        h2 { font-size: 1.4rem; font-weight: 600; color: #1e2f47; }
        h3 { font-size: 1.1rem; font-weight: 600; color: #2c3e66; margin-bottom: 12px; }
        button {
            background: #2c3e66;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 60px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }
        button:hover {
            background: #1f2f4f;
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        button.outline {
            background: transparent;
            border: 1.5px solid #cbdde9;
            color: #2c3e66;
        }
        button.outline:hover {
            background: #eef3fc;
            border-color: #9bb3cc;
        }
        button.small {
            padding: 4px 12px;
            font-size: 0.75rem;
        }
        select {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 28px;
            font-size: 0.9rem;
            background: white;
            cursor: pointer;
        }
        input {
            width: 100%;
            padding: 8px 12px;
            border: 1.5px solid #e2e8f0;
            border-radius: 20px;
            font-size: 0.85rem;
            background: white;
        }
        input:focus {
            outline: none;
            border-color: #2c3e66;
            box-shadow: 0 0 0 3px rgba(44,62,102,0.15);
        }
        textarea {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #e2e8f0;
            border-radius: 20px;
            font-size: 0.85rem;
            font-family: monospace;
            resize: vertical;
        }
        .flex-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .project-selector {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
        .project-selector select {
            flex: 1;
            min-width: 180px;
        }
        .main-item-card {
            background: #ffffff;
            border-radius: 24px;
            margin-bottom: 16px;
            border: 1px solid #edf2f7;
            overflow: hidden;
        }
        .main-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: #fafcff;
            cursor: pointer;
            border-bottom: 1px solid transparent;
        }
        .main-item-header:hover {
            background: #f5f8fe;
        }
        .main-item-header .title {
            font-weight: 600;
            color: #1e2f47;
        }
        .main-item-header .badge {
            font-size: 0.7rem;
            background: #ecf3fa;
            padding: 2px 8px;
            border-radius: 30px;
            color: #2c5a7a;
        }
        .main-item-detail {
            padding: 0 20px 16px 20px;
            border-top: 1px solid #eef2fa;
            display: none;
        }
        .main-item-detail.expanded {
            display: block;
        }
        .sub-item-list {
            margin-top: 12px;
            margin-left: 20px;
            padding-left: 12px;
            border-left: 2px solid #e2eaf2;
        }
        .sub-item-card {
            background: #fafcff;
            border-radius: 16px;
            margin: 8px 0;
            border: 1px solid #edf2f9;
            overflow: hidden;
        }
        .sub-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: #ffffff;
            cursor: pointer;
        }
        .sub-item-header .title {
            font-weight: 500;
            font-size: 0.85rem;
        }
        .sub-item-detail {
            padding: 8px 12px 12px 12px;
            border-top: 1px solid #eef2fa;
            display: none;
        }
        .sub-item-detail.expanded {
            display: block;
        }
        .sort-buttons {
            display: inline-flex;
            gap: 4px;
        }
        .sort-buttons button {
            padding: 2px 8px;
            font-size: 0.7rem;
            background: #eef2f9;
            color: #2c3e66;
        }
        .sort-buttons button:hover {
            background: #d9e2ef;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 24px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .modal-header h3 {
            margin: 0;
        }
        .close-btn {
            background: none;
            font-size: 1.5rem;
            padding: 0;
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }
        .format-example {
            background: #f8fafc;
            padding: 12px;
            border-radius: 16px;
            font-size: 0.8rem;
            font-family: monospace;
            margin: 12px 0;
        }
        .toast-msg {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1e2f3e;
            color: white;
            padding: 10px 24px;
            border-radius: 60px;
            font-size: 0.85rem;
            z-index: 9999;
        }
        .status-bar {
            background: #fff6e0;
            border-left: 5px solid #f5a623;
            padding: 12px 20px;
            margin-bottom: 20px;
            border-radius: 24px;
        }
        @media (max-width: 640px) {
            body { padding: 0; }
            .panel { padding: 16px; border-radius: 0; }
            .main-item-header { padding: 10px 12px; }
            .main-item-detail { padding: 0 12px 12px 12px; }
            .sub-item-list { margin-left: 8px; padding-left: 8px; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div id="firebaseStatus" class="status-bar" style="display: none;"></div>
    <div class="panel">
        <div class="panel-header">
            <h1>📁 專案管理中心</h1>
            <button id="aboutBtn" class="outline">ℹ️ 關於</button>
        </div>
        <div>
            <div class="flex-row" style="justify-content: space-between; margin-bottom: 20px;">
                <h2>📌 專案管理</h2>
                <button id="addNewProjectBtn">➕ 新增專案</button>
            </div>
            <div class="project-selector">
                <select id="projectSelect">
                    <option value="">-- 選擇專案 --</option>
                </select>
                <button id="viewSelectedProjectBtn" class="outline small">🔍 檢視</button>
                <button id="deleteSelectedProjectBtn" class="outline small danger">🗑️ 刪除</button>
            </div>
        </div>
        <div id="currentProjectEditor" style="margin-top: 32px;">
            <div class="flex-row" style="justify-content: space-between;">
                <h2>✏️ 編輯專案內容</h2>
                <div class="flex-row">
                    <button id="batchImportBtn" class="outline">📥 批次匯入</button>
                    <button id="saveCurrentProjectBtn" class="outline">💾 儲存專案</button>
                </div>
            </div>
            <div id="editorContent"></div>
        </div>
    </div>
</div>

<script>
    // ---------- Firebase Realtime Database 初始化 ----------
    const firebaseConfig = {
        apiKey: "AIzaSyBv4ft0YCyyvzHQM-wQgMKsW3uDSzbYaZo",
        authDomain: "travellink-a3a2d.firebaseapp.com",
        databaseURL: "https://travellink-a3a2d-default-rtdb.firebaseio.com",
        projectId: "travellink-a3a2d",
        storageBucket: "travellink-a3a2d.firebasestorage.app",
        messagingSenderId: "312024413763",
        appId: "1:312024413763:web:a3e4b33c4f4b99656e46f6"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const projectsRef = db.ref('projects');

    let isDBReady = true;
    const statusDiv = document.getElementById('firebaseStatus');
    function updateStatus(connected, errorMsg = '') {
        if (!statusDiv) return;
        if (connected) {
            statusDiv.style.display = 'none';
        } else {
            statusDiv.style.display = 'block';
            statusDiv.innerHTML = `⚠️ 無法連線至 Realtime Database。請檢查網路或 Firebase 設定。${errorMsg ? `<br>${escapeHtml(errorMsg)}` : ''}`;
        }
    }
    projectsRef.once('value').catch(err => {
        isDBReady = false;
        updateStatus(false, err.message);
    }).then(() => {
        isDBReady = true;
        updateStatus(true);
    });

    let allProjects = [];
    let currentProject = null;
    let currentEditProjectCode = null;
    let tempNewMainItem = null;

    function generateGuid() { return crypto.randomUUID ? crypto.randomUUID() : 'id-' + Date.now() + '-' + Math.random().toString(36); }
    function showToast(msg, isError = false) {
        let toast = document.createElement('div');
        toast.className = 'toast-msg';
        if (isError) toast.style.background = '#b91c1c';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    function sanitizeUrl(url) {
        if (!url) return '';
        url = url.trim();
        if (url.startsWith('http://') || url.startsWith('https://')) return url;
        return '';
    }

    async function saveAllProjectsToDB() {
        if (!isDBReady) { showToast("⚠️ 離線模式，變更僅存本機", true); return false; }
        try {
            const projectsObj = {};
            for (const proj of allProjects) {
                projectsObj[proj.projectCode] = {
                    projectCode: proj.projectCode,
                    projectName: proj.projectName,
                    mainItems: proj.mainItems || []
                };
            }
            await projectsRef.set(projectsObj);
            showToast("✅ 已同步雲端");
            return true;
        } catch (err) {
            console.error(err);
            showToast(`❌ 雲端儲存失敗: ${err.message}`, true);
            return false;
        }
    }

    async function loadProjectsFromDB() {
        try {
            const snapshot = await projectsRef.once('value');
            const data = snapshot.val();
            if (data) {
                allProjects = Object.values(data);
                allProjects.forEach(proj => {
                    if (!proj.mainItems) proj.mainItems = [];
                    proj.mainItems.forEach(item => {
                        if (!item.subItems) item.subItems = [];
                    });
                });
            } else {
                allProjects = [];
            }
            return allProjects;
        } catch (err) {
            console.error(err);
            updateStatus(false, err.message);
            isDBReady = false;
            showToast("⚠️ 讀取雲端失敗，使用本機資料", true);
            return allProjects;
        }
    }

    async function refreshAdminUI() {
        await loadProjectsFromDB();
        renderProjectSelect();
        if (currentEditProjectCode) {
            const found = allProjects.find(p => p.projectCode === currentEditProjectCode);
            if (found) {
                currentProject = JSON.parse(JSON.stringify(found));
                if (!currentProject.mainItems) currentProject.mainItems = [];
                currentProject.mainItems.forEach(item => {
                    if (!item.subItems) item.subItems = [];
                });
                renderEditorForm();
                const select = document.getElementById('projectSelect');
                if (select) select.value = currentEditProjectCode;
            } else {
                currentEditProjectCode = null; currentProject = null;
                document.getElementById('editorContent').innerHTML = '<div class="empty-msg">請選擇專案</div>';
            }
        } else if (allProjects.length > 0 && !currentProject) {
            currentEditProjectCode = allProjects[0].projectCode;
            currentProject = JSON.parse(JSON.stringify(allProjects[0]));
            if (!currentProject.mainItems) currentProject.mainItems = [];
            currentProject.mainItems.forEach(item => {
                if (!item.subItems) item.subItems = [];
            });
            renderEditorForm();
            const select = document.getElementById('projectSelect');
            if (select) select.value = currentEditProjectCode;
        } else if (!currentProject || allProjects.length === 0) {
            document.getElementById('editorContent').innerHTML = '<div class="empty-msg">尚無專案，點「新增專案」開始</div>';
        } else {
            renderEditorForm();
        }
    }

    function renderProjectSelect() {
        const select = document.getElementById('projectSelect');
        if (!select) return;
        select.innerHTML = '<option value="">-- 選擇專案 --</option>';
        allProjects.forEach(proj => {
            const option = document.createElement('option');
            option.value = proj.projectCode;
            option.textContent = proj.projectName;
            select.appendChild(option);
        });
        if (currentEditProjectCode) {
            select.value = currentEditProjectCode;
        }
    }

    function switchToProject(projectCode) {
        const target = allProjects.find(p => p.projectCode === projectCode);
        if (target) {
            currentEditProjectCode = projectCode;
            currentProject = JSON.parse(JSON.stringify(target));
            if (!currentProject.mainItems) currentProject.mainItems = [];
            currentProject.mainItems.forEach(item => {
                if (!item.subItems) item.subItems = [];
            });
            tempNewMainItem = null;
            renderEditorForm();
            renderProjectSelect();
        }
    }

    async function deleteCurrentProject() {
        if (!currentEditProjectCode) {
            showToast("請先選擇一個專案", true);
            return;
        }
        if (confirm(`確定刪除專案「${currentProject?.projectName}」？`)) {
            await deleteProjectByCode(currentEditProjectCode);
        }
    }

    async function deleteProjectByCode(code) {
        allProjects = allProjects.filter(p => p.projectCode !== code);
        if (currentEditProjectCode === code) {
            currentEditProjectCode = null; currentProject = null;
            document.getElementById('editorContent').innerHTML = '<div class="empty-msg">請選擇專案</div>';
        }
        renderProjectSelect();
        await saveAllProjectsToDB();
        showToast("已刪除");
    }

    // ---------- 批次匯入功能 ----------
    function showBatchImportModal() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <div class="modal-header">
                    <h3>📥 批次匯入主項目/子項目</h3>
                    <button class="close-btn" id="closeModalBtn">✕</button>
                </div>
                <p>格式說明：</p>
                <div class="format-example">
                    # 主項目名稱1<br>
                    主項目連結1（必須以 http:// 或 https:// 開頭）<br>
                    # 主項目名稱2（無連結，後續為子項目）<br>
                    子項目名稱1<br>
                    子項目連結1<br>
                    子項目名稱2<br>
                    子項目連結2<br>
                    # 主項目名稱3<br>
                    主項目連結3<br>
                    ...<br>
                    注意：主項目無連結時，請不要填寫連結行，直接寫子項目名稱和連結（成對出現）。
                </div>
                <textarea id="batchText" rows="12" placeholder="請貼上資料..."></textarea>
                <div class="flex-row" style="justify-content: flex-end; margin-top: 16px;">
                    <button id="cancelBatchBtn" class="outline">取消</button>
                    <button id="confirmBatchBtn">匯入</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);

        const closeModal = () => modal.remove();
        document.getElementById('closeModalBtn').onclick = closeModal;
        document.getElementById('cancelBatchBtn').onclick = closeModal;
        document.getElementById('confirmBatchBtn').onclick = () => {
            const text = document.getElementById('batchText').value;
            if (!text.trim()) {
                showToast("請輸入內容", true);
                return;
            }
            importBatchData(text);
            closeModal();
        };
    }

    function importBatchData(text) {
        if (!currentProject) {
            showToast("請先選擇一個專案", true);
            return;
        }
        const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0);
        let i = 0;
        let currentMainItem = null;
        const newMainItems = [];

        while (i < lines.length) {
            const line = lines[i].trim();
            if (line.startsWith('#')) {
                const name = line.substring(1).trim();
                let link = '';
                let nextLine = lines[i+1] ? lines[i+1].trim() : '';
                if (nextLine && !nextLine.startsWith('#') && sanitizeUrl(nextLine)) {
                    link = sanitizeUrl(nextLine);
                    i += 2;
                } else {
                    i += 1;
                }
                const newMain = {
                    id: generateGuid(),
                    name: name,
                    link: link,
                    subItems: []
                };
                newMainItems.push(newMain);
                currentMainItem = newMain;
            } else {
                if (!currentMainItem) {
                    showToast("子項目必須隸屬於某個主項目，請確認格式", true);
                    return;
                }
                if (currentMainItem.link) {
                    showToast(`主項目「${currentMainItem.name}」已有連結，不能再新增子項目`, true);
                    return;
                }
                const subName = line;
                const subLinkLine = lines[i+1] ? lines[i+1].trim() : '';
                if (!subLinkLine || subLinkLine.startsWith('#')) {
                    showToast(`子項目「${subName}」缺少對應的連結行，請確認格式`, true);
                    return;
                }
                const subLink = sanitizeUrl(subLinkLine);
                if (!subLink && subLinkLine) {
                    showToast(`子項目「${subName}」的連結無效，必須以 http:// 或 https:// 開頭`, true);
                    return;
                }
                currentMainItem.subItems.push({
                    id: generateGuid(),
                    name: subName,
                    link: subLink
                });
                i += 2;
            }
        }

        if (newMainItems.length === 0) {
            showToast("沒有解析到任何主項目", true);
            return;
        }

        currentProject.mainItems.push(...newMainItems);
        renderEditorForm();
        showToast(`已匯入 ${newMainItems.length} 個主項目`);
    }

    // ---------- 排序輔助 ----------
    function moveMainItemUp(index) {
        if (index > 0) {
            [currentProject.mainItems[index-1], currentProject.mainItems[index]] = [currentProject.mainItems[index], currentProject.mainItems[index-1]];
            renderEditorForm();
        }
    }
    function moveMainItemDown(index) {
        if (index < currentProject.mainItems.length - 1) {
            [currentProject.mainItems[index+1], currentProject.mainItems[index]] = [currentProject.mainItems[index], currentProject.mainItems[index+1]];
            renderEditorForm();
        }
    }
    function moveSubItemUp(mainIndex, subIndex) {
        const subItems = currentProject.mainItems[mainIndex].subItems;
        if (subIndex > 0) {
            [subItems[subIndex-1], subItems[subIndex]] = [subItems[subIndex], subItems[subIndex-1]];
            renderEditorForm();
        }
    }
    function moveSubItemDown(mainIndex, subIndex) {
        const subItems = currentProject.mainItems[mainIndex].subItems;
        if (subIndex < subItems.length - 1) {
            [subItems[subIndex+1], subItems[subIndex]] = [subItems[subIndex], subItems[subIndex+1]];
            renderEditorForm();
        }
    }

    // ---------- 編輯表單渲染 ----------
    function renderEditorForm() {
        if (!currentProject) return;
        const container = document.getElementById('editorContent');
        const mainItems = currentProject.mainItems || [];
        let displayItems = [...mainItems];
        if (tempNewMainItem) {
            displayItems = [tempNewMainItem, ...displayItems];
        }

        container.innerHTML = `
            <div style="margin-bottom: 28px;">
                <label style="font-weight:500;">專案名稱</label>
                <input type="text" id="editProjectName" value="${escapeHtml(currentProject.projectName)}" placeholder="輸入專案名稱">
            </div>
            <div class="flex-row" style="justify-content: space-between; margin-bottom: 16px;">
                <h3>📂 主項目</h3>
                <button id="addMainItemBtn" class="small">➕ 新增主項目</button>
            </div>
            <div id="mainItemsList">
                ${displayItems.map((item, idx) => renderMainItemCard(item, idx, item === tempNewMainItem)).join('')}
            </div>
        `;

        const nameInput = document.getElementById('editProjectName');
        if (nameInput) nameInput.addEventListener('change', (e) => { currentProject.projectName = e.target.value; });

        const addMainBtn = document.getElementById('addMainItemBtn');
        if (addMainBtn) {
            addMainBtn.replaceWith(addMainBtn.cloneNode(true));
            const newBtn = document.getElementById('addMainItemBtn');
            newBtn.addEventListener('click', () => {
                if (tempNewMainItem) {
                    showToast("請先完成目前新增的主項目", true);
                    return;
                }
                tempNewMainItem = {
                    id: generateGuid(),
                    name: "新主項目",
                    link: "",
                    subItems: [],
                    isNew: true
                };
                renderEditorForm();
                setTimeout(() => {
                    const newCard = document.querySelector(`.main-item-card[data-id="${tempNewMainItem.id}"]`);
                    if (newCard) {
                        const detail = newCard.querySelector('.main-item-detail');
                        if (detail) detail.classList.add('expanded');
                        const header = newCard.querySelector('.main-item-header');
                        if (header) header.style.borderBottom = "1px solid #eef2fa";
                    }
                }, 50);
            });
        }

        // 主項目頭部點擊展開/收合
        document.querySelectorAll('.main-item-header').forEach(header => {
            header.addEventListener('click', (e) => {
                if (e.target.closest('.action-buttons')) return;
                const card = header.closest('.main-item-card');
                const detail = card.querySelector('.main-item-detail');
                detail.classList.toggle('expanded');
                if (detail.classList.contains('expanded')) {
                    header.style.borderBottom = "1px solid #eef2fa";
                } else {
                    header.style.borderBottom = "1px solid transparent";
                }
            });
        });

        // 主項目刪除
        document.querySelectorAll('.delete-main-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');
                if (tempNewMainItem && tempNewMainItem.id === id) {
                    tempNewMainItem = null;
                    renderEditorForm();
                    return;
                }
                currentProject.mainItems = currentProject.mainItems.filter(i => i.id !== id);
                renderEditorForm();
            });
        });

        // 儲存主項目
        document.querySelectorAll('.save-main-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');
                const nameInput = document.querySelector(`.main-name-input[data-id="${id}"]`);
                const linkInput = document.querySelector(`.main-link-input[data-id="${id}"]`);
                if (tempNewMainItem && tempNewMainItem.id === id) {
                    tempNewMainItem.name = nameInput.value;
                    const rawLink = linkInput.value.trim();
                    tempNewMainItem.link = sanitizeUrl(rawLink);
                    if (rawLink && !tempNewMainItem.link) {
                        showToast("連結必須以 http:// 或 https:// 開頭", true);
                        return;
                    }
                    if (tempNewMainItem.link !== "") tempNewMainItem.subItems = [];
                    currentProject.mainItems.push(JSON.parse(JSON.stringify(tempNewMainItem)));
                    tempNewMainItem = null;
                    renderEditorForm();
                    showToast("主項目已新增");
                } else {
                    const item = currentProject.mainItems.find(i => i.id === id);
                    if (item) {
                        item.name = nameInput.value;
                        const rawLink = linkInput.value.trim();
                        const newLink = sanitizeUrl(rawLink);
                        if (rawLink && !newLink) {
                            showToast("連結必須以 http:// 或 https:// 開頭", true);
                            return;
                        }
                        item.link = newLink;
                        if (item.link !== "") item.subItems = [];
                        renderEditorForm();
                        showToast("已更新");
                    }
                }
            });
        });

        // 取消新增主項目
        document.querySelectorAll('.cancel-main-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');
                if (tempNewMainItem && tempNewMainItem.id === id) {
                    tempNewMainItem = null;
                    renderEditorForm();
                }
            });
        });

        // 新增子項目
        document.querySelectorAll('.add-subitem-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const mainId = btn.getAttribute('data-mid');
                let mainItem = currentProject.mainItems.find(i => i.id === mainId);
                if (!mainItem && tempNewMainItem && tempNewMainItem.id === mainId) {
                    mainItem = tempNewMainItem;
                }
                if (mainItem && !mainItem.link) {
                    if (!mainItem.subItems) mainItem.subItems = [];
                    const newSub = { id: generateGuid(), name: "新子項目", link: "", isNew: true };
                    mainItem.subItems.push(newSub);
                    renderEditorForm();
                    setTimeout(() => {
                        const card = document.querySelector(`.main-item-card[data-id="${mainId}"]`);
                        if (card) {
                            const detail = card.querySelector('.main-item-detail');
                            detail.classList.add('expanded');
                            const subCard = card.querySelector(`.sub-item-card[data-sub-id="${newSub.id}"]`);
                            if (subCard) {
                                const subDetail = subCard.querySelector('.sub-item-detail');
                                if (subDetail) subDetail.classList.add('expanded');
                            }
                        }
                    }, 50);
                } else if (mainItem && mainItem.link) {
                    showToast("主項目已有連結，無法新增子項目", true);
                }
            });
        });

        // 子項目展開/收合
        document.querySelectorAll('.sub-item-header').forEach(header => {
            header.addEventListener('click', (e) => {
                if (e.target.closest('.action-buttons')) return;
                const detail = header.nextElementSibling;
                detail.classList.toggle('expanded');
            });
        });

        // 子項目儲存
        document.querySelectorAll('.save-sub-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const mainId = btn.getAttribute('data-mid');
                const subId = btn.getAttribute('data-sid');
                const nameInput = document.querySelector(`.sub-name-input[data-mid="${mainId}"][data-sid="${subId}"]`);
                const linkInput = document.querySelector(`.sub-link-input[data-mid="${mainId}"][data-sid="${subId}"]`);
                let mainItem = currentProject.mainItems.find(i => i.id === mainId);
                if (!mainItem && tempNewMainItem && tempNewMainItem.id === mainId) mainItem = tempNewMainItem;
                const subItem = mainItem?.subItems.find(s => s.id === subId);
                if (subItem) {
                    subItem.name = nameInput.value;
                    const rawLink = linkInput.value.trim();
                    const newLink = sanitizeUrl(rawLink);
                    if (rawLink && !newLink) {
                        showToast("連結必須以 http:// 或 https:// 開頭", true);
                        return;
                    }
                    subItem.link = newLink;
                    renderEditorForm();
                    showToast("子項目已更新");
                }
            });
        });

        // 子項目刪除
        document.querySelectorAll('.delete-sub-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const mainId = btn.getAttribute('data-mid');
                const subId = btn.getAttribute('data-sid');
                let mainItem = currentProject.mainItems.find(i => i.id === mainId);
                if (!mainItem && tempNewMainItem && tempNewMainItem.id === mainId) mainItem = tempNewMainItem;
                if (mainItem) {
                    mainItem.subItems = mainItem.subItems.filter(s => s.id !== subId);
                    renderEditorForm();
                }
            });
        });

        // 子項目排序（上移/下移）
        document.querySelectorAll('.move-up-sub').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const mainIdx = parseInt(btn.getAttribute('data-main-idx'));
                const subIdx = parseInt(btn.getAttribute('data-sub-idx'));
                moveSubItemUp(mainIdx, subIdx);
            });
        });
        document.querySelectorAll('.move-down-sub').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const mainIdx = parseInt(btn.getAttribute('data-main-idx'));
                const subIdx = parseInt(btn.getAttribute('data-sub-idx'));
                moveSubItemDown(mainIdx, subIdx);
            });
        });

        // 主項目排序
        document.querySelectorAll('.move-up-main').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const idx = parseInt(btn.getAttribute('data-idx'));
                if (tempNewMainItem) {
                    showToast("請先完成新增的主項目", true);
                    return;
                }
                moveMainItemUp(idx);
            });
        });
        document.querySelectorAll('.move-down-main').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const idx = parseInt(btn.getAttribute('data-idx'));
                if (tempNewMainItem) {
                    showToast("請先完成新增的主項目", true);
                    return;
                }
                moveMainItemDown(idx);
            });
        });
    }

    function renderMainItemCard(item, idx, isTemp) {
        const hasLink = item.link && item.link.trim() !== "";
        const isExpanded = isTemp;
        return `
            <div class="main-item-card" data-id="${item.id}">
                <div class="main-item-header" style="${isExpanded ? 'border-bottom: 1px solid #eef2fa;' : ''}">
                    <div class="flex-row" style="gap: 8px;">
                        <span class="title">📌 ${escapeHtml(item.name)}</span>
                        ${hasLink ? `<span class="badge">🔗 有連結</span>` : `<span class="badge">📎 可設子項目</span>`}
                    </div>
                    <div class="action-buttons flex-row" style="gap: 6px;">
                        ${!isTemp ? `
                            <div class="sort-buttons">
                                <button class="small move-up-main" data-idx="${idx}" ${idx === 0 ? 'disabled style="opacity:0.5;"' : ''}>▲</button>
                                <button class="small move-down-main" data-idx="${idx}" ${idx === currentProject.mainItems.length-1 ? 'disabled style="opacity:0.5;"' : ''}>▼</button>
                            </div>
                        ` : ''}
                        <button class="small danger delete-main-btn" data-id="${item.id}">🗑️</button>
                    </div>
                </div>
                <div class="main-item-detail ${isExpanded ? 'expanded' : ''}">
                    <div class="main-item-fields" style="display: flex; gap: 12px; margin-bottom: 16px;">
                        <div class="field" style="flex: 1;">
                            <label>主項目名稱</label>
                            <input type="text" class="main-name-input" data-id="${item.id}" value="${escapeHtml(item.name)}">
                        </div>
                        <div class="field" style="flex: 1;">
                            <label>連結 (需以 http:// 或 https:// 開頭，留空則可新增子項目)</label>
                            <input type="text" class="main-link-input" data-id="${item.id}" value="${escapeHtml(item.link)}" placeholder="https://...">
                        </div>
                    </div>
                    <div style="margin-top: 12px;">
                        <div class="flex-row" style="justify-content: space-between; margin-bottom: 8px;">
                            <strong>📂 子項目</strong>
                            <button class="small add-subitem-btn" data-mid="${item.id}">➕ 新增子項目</button>
                        </div>
                        <div class="sub-item-list">
                            ${(item.subItems || []).map((sub, subIdx) => renderSubItemCard(item.id, sub, subIdx, idx)).join('') || '<div class="empty-msg" style="padding:12px;">無子項目</div>'}
                        </div>
                    </div>
                    <div class="flex-row" style="justify-content: flex-end; margin-top: 16px;">
                        ${isTemp ? `
                            <button class="small cancel-main-btn" data-id="${item.id}">取消</button>
                            <button class="small save-main-btn" data-id="${item.id}">儲存</button>
                        ` : `
                            <button class="small save-main-btn" data-id="${item.id}">儲存修改</button>
                        `}
                    </div>
                </div>
            </div>
        `;
    }

    function renderSubItemCard(mainId, sub, subIdx, mainIdx) {
        const isExpanded = sub.isNew;
        return `
            <div class="sub-item-card" data-sub-id="${sub.id}">
                <div class="sub-item-header">
                    <div class="flex-row" style="gap: 8px;">
                        <span class="title">📎 ${escapeHtml(sub.name)}</span>
                        <div class="sort-buttons">
                            <button class="small move-up-sub" data-main-idx="${mainIdx}" data-sub-idx="${subIdx}" ${subIdx === 0 ? 'disabled style="opacity:0.5;"' : ''}>▲</button>
                            <button class="small move-down-sub" data-main-idx="${mainIdx}" data-sub-idx="${subIdx}" ${subIdx === (currentProject.mainItems[mainIdx]?.subItems?.length-1) ? 'disabled style="opacity:0.5;"' : ''}>▼</button>
                        </div>
                    </div>
                    <div class="action-buttons flex-row" style="gap: 4px;">
                        <button class="small danger delete-sub-btn" data-mid="${mainId}" data-sid="${sub.id}">🗑️</button>
                    </div>
                </div>
                <div class="sub-item-detail ${isExpanded ? 'expanded' : ''}">
                    <div class="sub-item-fields" style="display: flex; gap: 12px; margin-bottom: 12px;">
                        <div class="field" style="flex: 1;">
                            <label>子項目名稱</label>
                            <input type="text" class="sub-name-input" data-mid="${mainId}" data-sid="${sub.id}" value="${escapeHtml(sub.name)}">
                        </div>
                        <div class="field" style="flex: 1;">
                            <label>連結 (需以 http:// 或 https:// 開頭)</label>
                            <input type="text" class="sub-link-input" data-mid="${mainId}" data-sid="${sub.id}" value="${escapeHtml(sub.link)}" placeholder="https://...">
                        </div>
                    </div>
                    <div style="display: flex; justify-content: flex-end;">
                        <button class="small save-sub-btn" data-mid="${mainId}" data-sid="${sub.id}">儲存</button>
                    </div>
                </div>
            </div>
        `;
    }

    async function saveCurrentProject() {
        if (!currentProject || !currentEditProjectCode) return;
        if (tempNewMainItem) {
            showToast("請先完成新增的主項目", true);
            return;
        }
        const index = allProjects.findIndex(p => p.projectCode === currentEditProjectCode);
        if (index !== -1) allProjects[index] = JSON.parse(JSON.stringify(currentProject));
        else allProjects.push(JSON.parse(JSON.stringify(currentProject)));
        renderProjectSelect();
        await saveAllProjectsToDB();
        showToast("已儲存");
    }

    async function createNewProject() {
        const newCode = generateGuid();
        const newProject = { projectCode: newCode, projectName: "新專案", mainItems: [] };
        allProjects.push(newProject);
        currentEditProjectCode = newCode;
        currentProject = JSON.parse(JSON.stringify(newProject));
        renderProjectSelect();
        renderEditorForm();
        await saveAllProjectsToDB();
        showToast("新專案已建立");
    }

    // ---------- 關於彈窗 ----------
    function showAboutModal() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>📌 關於本系統</h3>
                <div class="logo" style="display: flex; justify-content: center; gap: 20px; margin: 16px 0;">
                    <span style="font-weight:500;">🤖 DeepSeek</span>
                    <span style="font-weight:500;">🔥 Firebase</span>
                </div>
                <p>構想：<a href="mailto:jumper.hsu@gmail.com">jumper.hsu@gmail.com</a></p>
                <p>設計：DeepSeek</p>
                <p>資料庫：Firebase</p>
                <p>版次：20260326.01</p>
                <button id="closeAboutBtn" class="outline small" style="margin-top: 16px;">關閉</button>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById('closeAboutBtn').onclick = () => modal.remove();
    }

    function openViewer(projectCode) {
        window.open(`view.html?projectCode=${encodeURIComponent(projectCode)}`, '_blank');
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    window.onload = async () => {
        document.getElementById('addNewProjectBtn')?.addEventListener('click', createNewProject);
        document.getElementById('saveCurrentProjectBtn')?.addEventListener('click', saveCurrentProject);
        document.getElementById('batchImportBtn')?.addEventListener('click', showBatchImportModal);
        document.getElementById('viewSelectedProjectBtn')?.addEventListener('click', () => {
            const select = document.getElementById('projectSelect');
            const code = select.value;
            if (code) openViewer(code);
            else showToast("請先選擇一個專案", true);
        });
        document.getElementById('deleteSelectedProjectBtn')?.addEventListener('click', deleteCurrentProject);
        document.getElementById('projectSelect')?.addEventListener('change', (e) => {
            const code = e.target.value;
            if (code) switchToProject(code);
            else {
                currentEditProjectCode = null;
                currentProject = null;
                document.getElementById('editorContent').innerHTML = '<div class="empty-msg">請選擇專案</div>';
            }
        });
        document.getElementById('aboutBtn')?.addEventListener('click', showAboutModal);
        await loadProjectsFromDB();
        refreshAdminUI();
    };
</script>
</body>
</html>
