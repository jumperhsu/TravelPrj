<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>專案檢視模式</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* ---------- 預設主題變數 (default) ---------- */
        :root,
        [data-theme="default"] {
            --bg-body: #f5f7fb;
            --bg-header: #ffffff;
            --border-header: #e2e8f0;
            --text-header: #1e2f47;
            --bg-tab-active: #2c3e66;
            --text-tab-active: #ffffff;
            --bg-tab-inactive: #f1f5f9;
            --text-tab-inactive: #334155;
            --bg-sub-wrapper: #f8fafc;
            --border-sub: #e2edf2;
            --bg-sub-tab-inactive: #eef2ff;
            --text-sub-tab-inactive: #2c3e66;
            --bg-sub-tab-active: #2c3e66;
            --text-sub-tab-active: white;
            --iframe-bg: #eef2f6;
            --modal-bg: white;
            --button-outline-border: #cbdde9;
            --button-outline-text: #2c3e66;
        }

        /* ---------- 海洋主題 (ocean) ---------- */
        [data-theme="ocean"] {
            --bg-body: #e0f2fe;
            --bg-header: #ffffff;
            --border-header: #bae6fd;
            --text-header: #0369a1;
            --bg-tab-active: #0284c7;
            --text-tab-active: #ffffff;
            --bg-tab-inactive: #e0f2fe;
            --text-tab-inactive: #0c4a6e;
            --bg-sub-wrapper: #f0f9ff;
            --border-sub: #bae6fd;
            --bg-sub-tab-inactive: #dbeafe;
            --text-sub-tab-inactive: #1e40af;
            --bg-sub-tab-active: #0284c7;
            --text-sub-tab-active: white;
            --iframe-bg: #e0f2fe;
            --modal-bg: white;
            --button-outline-border: #7dd3fc;
            --button-outline-text: #0369a1;
        }

        /* ---------- 森林主題 (forest) ---------- */
        [data-theme="forest"] {
            --bg-body: #ecfdf5;
            --bg-header: #ffffff;
            --border-header: #a7f3d0;
            --text-header: #065f46;
            --bg-tab-active: #059669;
            --text-tab-active: #ffffff;
            --bg-tab-inactive: #d1fae5;
            --text-tab-inactive: #064e3b;
            --bg-sub-wrapper: #f0fdf4;
            --border-sub: #a7f3d0;
            --bg-sub-tab-inactive: #ccfbf1;
            --text-sub-tab-inactive: #115e59;
            --bg-sub-tab-active: #059669;
            --text-sub-tab-active: white;
            --iframe-bg: #d1fae5;
            --modal-bg: white;
            --button-outline-border: #6ee7b7;
            --button-outline-text: #065f46;
        }

        /* ---------- 日落主題 (sunset) ---------- */
        [data-theme="sunset"] {
            --bg-body: #fff7ed;
            --bg-header: #ffffff;
            --border-header: #fed7aa;
            --text-header: #9a3412;
            --bg-tab-active: #ea580c;
            --text-tab-active: #ffffff;
            --bg-tab-inactive: #ffedd5;
            --text-tab-inactive: #7c2d12;
            --bg-sub-wrapper: #fff7ed;
            --border-sub: #fed7aa;
            --bg-sub-tab-inactive: #ffedd5;
            --text-sub-tab-inactive: #9a3412;
            --bg-sub-tab-active: #ea580c;
            --text-sub-tab-active: white;
            --iframe-bg: #ffedd5;
            --modal-bg: white;
            --button-outline-border: #fdba74;
            --button-outline-text: #9a3412;
        }

        /* ---------- 暗夜主題 (night) ---------- */
        [data-theme="night"] {
            --bg-body: #0f172a;
            --bg-header: #1e293b;
            --border-header: #334155;
            --text-header: #e2e8f0;
            --bg-tab-active: #475569;
            --text-tab-active: #f1f5f9;
            --bg-tab-inactive: #334155;
            --text-tab-inactive: #cbd5e1;
            --bg-sub-wrapper: #1e293b;
            --border-sub: #475569;
            --bg-sub-tab-inactive: #334155;
            --text-sub-tab-inactive: #e2e8f0;
            --bg-sub-tab-active: #64748b;
            --text-sub-tab-active: white;
            --iframe-bg: #0f172a;
            --modal-bg: #1e293b;
            --button-outline-border: #64748b;
            --button-outline-text: #cbd5e1;
            /* 暗夜模式下的按鈕 hover 等可再微調，此處保留基本 */
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: var(--bg-body);
            height: 100vh;
            overflow: hidden;
            transition: background 0.25s ease;
        }
        .viewer-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .viewer-header {
            background: var(--bg-header);
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-header);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .viewer-header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-header);
        }
        .viewer-tabs-wrapper {
            background: var(--bg-header);
            border-bottom: 1px solid var(--border-header);
            flex-shrink: 0;
            padding: 0.5rem 1.25rem 0 1.25rem;
        }
        .viewer-tabs-scroll {
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 0.5rem;
        }
        .viewer-tabs-list {
            display: flex;
            gap: 0.5rem;
        }
        .viewer-tab {
            background: var(--bg-tab-inactive);
            border: none;
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            font-weight: 500;
            border-radius: 2rem;
            color: var(--text-tab-inactive);
            cursor: pointer;
            transition: 0.2s;
        }
        .viewer-tab.active {
            background: var(--bg-tab-active);
            color: var(--text-tab-active);
        }
        .viewer-sub-tabs-wrapper {
            background: var(--bg-sub-wrapper);
            border-bottom: 1px solid var(--border-sub);
            flex-shrink: 0;
            padding: 0.25rem 1.25rem 0 1.25rem;
        }
        .viewer-sub-tabs-list {
            display: flex;
            gap: 0.4rem;
            padding-bottom: 0.4rem;
            flex-wrap: wrap;
        }
        .viewer-sub-tab {
            background: var(--bg-sub-tab-inactive);
            border: none;
            padding: 0.35rem 0.9rem;
            font-size: 0.75rem;
            border-radius: 2rem;
            color: var(--text-sub-tab-inactive);
            cursor: pointer;
        }
        .viewer-sub-tab.active {
            background: var(--bg-sub-tab-active);
            color: var(--text-sub-tab-active);
        }
        .iframe-container {
            flex: 1;
            background: var(--iframe-bg);
            margin: 0;
            position: relative;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(245,247,250,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .loading-spinner {
            background: var(--bg-header);
            color: var(--text-header);
            padding: 1rem 1.8rem;
            border-radius: 3rem;
            display: flex;
            gap: 0.8rem;
            box-shadow: 0 12px 24px -8px rgba(0,0,0,0.15);
        }
        .spinner-circle {
            width: 1.4rem;
            height: 1.4rem;
            border: 3px solid #cbd5e1;
            border-top-color: var(--bg-tab-active);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--modal-bg);
            color: var(--text-header);
            border-radius: 32px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            border: 1px solid var(--border-header);
        }
        .modal-content .logo {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 16px 0;
        }
        button.outline {
            background: transparent;
            border: 1px solid var(--button-outline-border);
            color: var(--button-outline-text);
            padding: 4px 12px;
            border-radius: 60px;
            cursor: pointer;
        }
        @media (max-width: 640px) {
            .viewer-tabs-wrapper { padding: 0.4rem 0.5rem 0 0.5rem; }
            .viewer-sub-tabs-wrapper { padding: 0.2rem 0.5rem 0 0.5rem; }
            .viewer-header { padding: 8px 12px; }
        }
    </style>
</head>
<body>
<div class="viewer-container">
    <div class="viewer-header">
        <h1 id="viewerTitle">載入中...</h1>
        <button id="aboutBtn" class="outline">ℹ️ 關於</button>
    </div>
    <div class="viewer-tabs-wrapper">
        <div class="viewer-tabs-scroll">
            <div class="viewer-tabs-list" id="mainTabs"></div>
        </div>
    </div>
    <div id="subTabsWrapper" class="viewer-sub-tabs-wrapper" style="display: none;">
        <div class="viewer-sub-tabs-list" id="subTabs"></div>
    </div>
    <div class="iframe-container" id="iframeContainer">
        <div id="loadingOverlay" class="loading-overlay" style="display: none;">
            <div class="loading-spinner">
                <div class="spinner-circle"></div>
                <span>載入中...</span>
            </div>
        </div>
        <iframe id="contentIframe" title="內容" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-downloads"></iframe>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBv4ft0YCyyvzHQM-wQgMKsW3uDSzbYaZo",
        authDomain: "travellink-a3a2d.firebaseapp.com",
        databaseURL: "https://travellink-a3a2d-default-rtdb.firebaseio.com",
        projectId: "travellink-a3a2d",
        storageBucket: "travellink-a3a2d.firebasestorage.app",
        messagingSenderId: "312024413763",
        appId: "1:312024413763:web:a3e4b33c4f4b99656e46f6"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const params = new URLSearchParams(window.location.search);
    const projectCode = params.get('projectCode');
    if (!projectCode) {
        document.getElementById('viewerTitle').innerText = '缺少專案代碼';
        document.getElementById('contentIframe').srcdoc = '<html><body>無效的連結</body></html>';
    } else {
        loadProject(projectCode);
    }

    async function loadProject(code) {
        try {
            const snapshot = await db.ref('projects/' + code).once('value');
            const data = snapshot.val();
            if (!data) throw new Error('專案不存在');

            // ---- 套用專案設定的主題 ----
            const theme = data.theme || 'default';
            document.documentElement.setAttribute('data-theme', theme);

            document.getElementById('viewerTitle').innerText = data.projectName || '未命名';
            document.title = data.projectName || '專案檢視';
            renderTabs(data.mainItems || []);
        } catch (err) {
            document.getElementById('viewerTitle').innerText = '載入失敗';
            document.getElementById('contentIframe').srcdoc = `<html><body>❌ ${err.message}</body></html>`;
        }
    }

    function renderTabs(mainItems) {
        const mainTabsDiv = document.getElementById('mainTabs');
        const subTabsWrapper = document.getElementById('subTabsWrapper');
        const subTabsDiv = document.getElementById('subTabs');
        const iframe = document.getElementById('contentIframe');
        const loading = document.getElementById('loadingOverlay');

        function showLoading() { loading.style.display = 'flex'; }
        function hideLoading() { loading.style.display = 'none'; }
        function loadUrl(url) {
            if (!url) {
                iframe.srcdoc = "<html><body>無效連結</body></html>";
                hideLoading();
                return;
            }
            showLoading();
            iframe.onload = hideLoading;
            iframe.onerror = () => {
                iframe.srcdoc = `<html><body>⚠️ 無法載入連結</body></html>`;
                hideLoading();
            };
            iframe.src = url;
        }

        mainTabsDiv.innerHTML = '';
        mainItems.forEach((item) => {
            const btn = document.createElement('button');
            btn.className = 'viewer-tab';
            btn.textContent = item.name;
            btn.dataset.id = item.id;
            btn.addEventListener('click', () => {
                document.querySelectorAll('.viewer-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                if (item.link && item.link.trim()) {
                    subTabsWrapper.style.display = 'none';
                    loadUrl(item.link);
                } else {
                    const subItems = item.subItems || [];
                    if (subItems.length) {
                        subTabsWrapper.style.display = 'block';
                        subTabsDiv.innerHTML = '';
                        subItems.forEach(sub => {
                            const subBtn = document.createElement('button');
                            subBtn.className = 'viewer-sub-tab';
                            subBtn.textContent = sub.name;
                            subBtn.dataset.id = sub.id;
                            subBtn.addEventListener('click', () => {
                                document.querySelectorAll('.viewer-sub-tab').forEach(s => s.classList.remove('active'));
                                subBtn.classList.add('active');
                                loadUrl(sub.link);
                            });
                            subTabsDiv.appendChild(subBtn);
                        });
                        const firstSub = subTabsDiv.querySelector('.viewer-sub-tab');
                        if (firstSub) firstSub.click();
                    } else {
                        subTabsWrapper.style.display = 'block';
                        subTabsDiv.innerHTML = '<div style="padding:8px;">此主項目無子項目</div>';
                        loadUrl(null);
                    }
                }
            });
            mainTabsDiv.appendChild(btn);
        });
        if (mainTabsDiv.firstChild) mainTabsDiv.firstChild.click();
    }

    // 關於彈窗
    function showAboutModal() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>📌 關於本系統</h3>
                <div class="logo">
                    <span style="font-weight:500;">🤖 DeepSeek</span>
                    <span style="font-weight:500;">🔥 Firebase</span>
                </div>
                <p>構想：<a href="mailto:jumper.hsu@gmail.com">jumper.hsu@gmail.com</a></p>
                <p>設計：DeepSeek</p>
                <p>資料庫：Firebase</p>
                <p>版次：20260326.02 (主題支援)</p>
                <button id="closeAboutBtn" class="outline small" style="margin-top: 16px;">關閉</button>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById('closeAboutBtn').onclick = () => modal.remove();
        // 按鈕樣式在彈窗內可能需要手動微調，但已套用變數基本可用
    }
    document.getElementById('aboutBtn').addEventListener('click', showAboutModal);
</script>
</body>
</html>
