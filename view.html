<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>專案檢視模式 - 智慧記憶</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* ---------- 預設主題變數 (default) ---------- */
        :root,
        [data-theme="default"] {
            --bg-body: #f5f7fb;
            --bg-header: #ffffff;
            --border-header: #e2e8f0;
            --text-header: #1e2f47;
            --bg-tab-active: #2c3e66;
            --text-tab-active: #ffffff;
            --bg-tab-inactive: #f1f5f9;
            --text-tab-inactive: #334155;
            --bg-sub-wrapper: #f8fafc;
            --border-sub: #e2edf2;
            --bg-sub-tab-inactive: #eef2ff;
            --text-sub-tab-inactive: #2c3e66;
            --bg-sub-tab-active: #2c3e66;
            --text-sub-tab-active: white;
            --iframe-bg: #eef2f6;
            --modal-bg: white;
            --button-outline-border: #cbdde9;
            --button-outline-text: #2c3e66;
        }

        /* ---------- 海洋主題 (ocean) ---------- */
        [data-theme="ocean"] {
            --bg-body: #e0f2fe;
            --bg-header: #ffffff;
            --border-header: #bae6fd;
            --text-header: #0369a1;
            --bg-tab-active: #0284c7;
            --text-tab-active: #ffffff;
            --bg-tab-inactive: #e0f2fe;
            --text-tab-inactive: #0c4a6e;
            --bg-sub-wrapper: #f0f9ff;
            --border-sub: #bae6fd;
            --bg-sub-tab-inactive: #dbeafe;
            --text-sub-tab-inactive: #1e40af;
            --bg-sub-tab-active: #0284c7;
            --text-sub-tab-active: white;
            --iframe-bg: #e0f2fe;
            --modal-bg: white;
            --button-outline-border: #7dd3fc;
            --button-outline-text: #0369a1;
        }

        /* ---------- 森林主題 (forest) ---------- */
        [data-theme="forest"] {
            --bg-body: #ecfdf5;
            --bg-header: #ffffff;
            --border-header: #a7f3d0;
            --text-header: #065f46;
            --bg-tab-active: #059669;
            --text-tab-active: #ffffff;
            --bg-tab-inactive: #d1fae5;
            --text-tab-inactive: #064e3b;
            --bg-sub-wrapper: #f0fdf4;
            --border-sub: #a7f3d0;
            --bg-sub-tab-inactive: #ccfbf1;
            --text-sub-tab-inactive: #115e59;
            --bg-sub-tab-active: #059669;
            --text-sub-tab-active: white;
            --iframe-bg: #d1fae5;
            --modal-bg: white;
            --button-outline-border: #6ee7b7;
            --button-outline-text: #065f46;
        }

        /* ---------- 日落主題 (sunset) ---------- */
        [data-theme="sunset"] {
            --bg-body: #fff7ed;
            --bg-header: #ffffff;
            --border-header: #fed7aa;
            --text-header: #9a3412;
            --bg-tab-active: #ea580c;
            --text-tab-active: #ffffff;
            --bg-tab-inactive: #ffedd5;
            --text-tab-inactive: #7c2d12;
            --bg-sub-wrapper: #fff7ed;
            --border-sub: #fed7aa;
            --bg-sub-tab-inactive: #ffedd5;
            --text-sub-tab-inactive: #9a3412;
            --bg-sub-tab-active: #ea580c;
            --text-sub-tab-active: white;
            --iframe-bg: #ffedd5;
            --modal-bg: white;
            --button-outline-border: #fdba74;
            --button-outline-text: #9a3412;
        }

        /* ---------- 暗夜主題 (night) ---------- */
        [data-theme="night"] {
            --bg-body: #0f172a;
            --bg-header: #1e293b;
            --border-header: #334155;
            --text-header: #e2e8f0;
            --bg-tab-active: #475569;
            --text-tab-active: #f1f5f9;
            --bg-tab-inactive: #334155;
            --text-tab-inactive: #cbd5e1;
            --bg-sub-wrapper: #1e293b;
            --border-sub: #475569;
            --bg-sub-tab-inactive: #334155;
            --text-sub-tab-inactive: #e2e8f0;
            --bg-sub-tab-active: #64748b;
            --text-sub-tab-active: white;
            --iframe-bg: #0f172a;
            --modal-bg: #1e293b;
            --button-outline-border: #64748b;
            --button-outline-text: #cbd5e1;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: var(--bg-body);
            height: 100vh;
            overflow: hidden;
            transition: background 0.25s ease;
        }
        .viewer-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .viewer-header {
            background: var(--bg-header);
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-header);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .viewer-header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-header);
        }
        .viewer-tabs-wrapper {
            background: var(--bg-header);
            border-bottom: 1px solid var(--border-header);
            flex-shrink: 0;
            padding: 0.5rem 1.25rem 0 1.25rem;
        }
        .viewer-tabs-scroll {
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 0.5rem;
        }
        .viewer-tabs-list {
            display: flex;
            gap: 0.5rem;
        }
        .viewer-tab {
            background: var(--bg-tab-inactive);
            border: none;
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            font-weight: 500;
            border-radius: 2rem;
            color: var(--text-tab-inactive);
            cursor: pointer;
            transition: 0.2s;
        }
        .viewer-tab.active {
            background: var(--bg-tab-active);
            color: var(--text-tab-active);
        }
        .viewer-sub-tabs-wrapper {
            background: var(--bg-sub-wrapper);
            border-bottom: 1px solid var(--border-sub);
            flex-shrink: 0;
            padding: 0.25rem 1.25rem 0 1.25rem;
        }
        .viewer-sub-tabs-list {
            display: flex;
            gap: 0.4rem;
            padding-bottom: 0.4rem;
            flex-wrap: wrap;
        }
        .viewer-sub-tab {
            background: var(--bg-sub-tab-inactive);
            border: none;
            padding: 0.35rem 0.9rem;
            font-size: 0.75rem;
            border-radius: 2rem;
            color: var(--text-sub-tab-inactive);
            cursor: pointer;
        }
        .viewer-sub-tab.active {
            background: var(--bg-sub-tab-active);
            color: var(--text-sub-tab-active);
        }
        .iframe-container {
            flex: 1;
            background: var(--iframe-bg);
            margin: 0;
            position: relative;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(245,247,250,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .loading-spinner {
            background: var(--bg-header);
            color: var(--text-header);
            padding: 1rem 1.8rem;
            border-radius: 3rem;
            display: flex;
            gap: 0.8rem;
            box-shadow: 0 12px 24px -8px rgba(0,0,0,0.15);
        }
        .spinner-circle {
            width: 1.4rem;
            height: 1.4rem;
            border: 3px solid #cbd5e1;
            border-top-color: var(--bg-tab-active);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--modal-bg);
            color: var(--text-header);
            border-radius: 32px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            border: 1px solid var(--border-header);
        }
        .modal-content .logo {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 16px 0;
        }
        button.outline {
            background: transparent;
            border: 1px solid var(--button-outline-border);
            color: var(--button-outline-text);
            padding: 4px 12px;
            border-radius: 60px;
            cursor: pointer;
        }
        @media (max-width: 640px) {
            .viewer-tabs-wrapper { padding: 0.4rem 0.5rem 0 0.5rem; }
            .viewer-sub-tabs-wrapper { padding: 0.2rem 0.5rem 0 0.5rem; }
            .viewer-header { padding: 8px 12px; }
        }
    </style>
</head>
<body>
<div class="viewer-container">
    <div class="viewer-header">
        <h1 id="viewerTitle">載入中...</h1>
        <button id="aboutBtn" class="outline">ℹ️ 關於</button>
    </div>
    <div class="viewer-tabs-wrapper">
        <div class="viewer-tabs-scroll">
            <div class="viewer-tabs-list" id="mainTabs"></div>
        </div>
    </div>
    <div id="subTabsWrapper" class="viewer-sub-tabs-wrapper" style="display: none;">
        <div class="viewer-sub-tabs-list" id="subTabs"></div>
    </div>
    <div class="iframe-container" id="iframeContainer">
        <div id="loadingOverlay" class="loading-overlay" style="display: none;">
            <div class="loading-spinner">
                <div class="spinner-circle"></div>
                <span>載入中...</span>
            </div>
        </div>
        <iframe id="contentIframe" title="內容" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-downloads"></iframe>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBv4ft0YCyyvzHQM-wQgMKsW3uDSzbYaZo",
        authDomain: "travellink-a3a2d.firebaseapp.com",
        databaseURL: "https://travellink-a3a2d-default-rtdb.firebaseio.com",
        projectId: "travellink-a3a2d",
        storageBucket: "travellink-a3a2d.firebasestorage.app",
        messagingSenderId: "312024413763",
        appId: "1:312024413763:web:a3e4b33c4f4b99656e46f6"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const params = new URLSearchParams(window.location.search);
    const projectCode = params.get('projectCode');
    if (!projectCode) {
        document.getElementById('viewerTitle').innerText = '缺少專案代碼';
        document.getElementById('contentIframe').srcdoc = '<html><body>無效的連結</body></html>';
    } else {
        loadProject(projectCode);
    }

    // ---------- 記憶工具 (使用 localStorage, 依照專案代碼區分) ----------
    function getStorageKey(projectCode, type) {
        return `viewer_memory_${projectCode}_${type}`;
    }

    function saveMainTabMemory(projectCode, mainItemId) {
        if (!projectCode || !mainItemId) return;
        try {
            localStorage.setItem(getStorageKey(projectCode, 'mainTab'), mainItemId);
        } catch(e) { console.warn(e); }
    }

    function getMainTabMemory(projectCode) {
        if (!projectCode) return null;
        try {
            return localStorage.getItem(getStorageKey(projectCode, 'mainTab'));
        } catch(e) { return null; }
    }

    function saveSubTabMemory(projectCode, subItemId) {
        if (!projectCode || !subItemId) return;
        try {
            localStorage.setItem(getStorageKey(projectCode, 'subTab'), subItemId);
        } catch(e) { console.warn(e); }
    }

    function getSubTabMemory(projectCode) {
        if (!projectCode) return null;
        try {
            return localStorage.getItem(getStorageKey(projectCode, 'subTab'));
        } catch(e) { return null; }
    }

    async function loadProject(code) {
        try {
            const snapshot = await db.ref('projects/' + code).once('value');
            const data = snapshot.val();
            if (!data) throw new Error('專案不存在');

            // 套用主題
            const theme = data.theme || 'default';
            document.documentElement.setAttribute('data-theme', theme);

            document.getElementById('viewerTitle').innerText = data.projectName || '未命名';
            document.title = data.projectName || '專案檢視';
            
            // 取得主選單資料
            const mainItems = data.mainItems || [];
            
            // 渲染並嘗試恢復記憶的頁籤
            renderTabsWithMemory(code, mainItems);
        } catch (err) {
            document.getElementById('viewerTitle').innerText = '載入失敗';
            document.getElementById('contentIframe').srcdoc = `<html><body>❌ ${err.message}</body></html>`;
        }
    }

    function renderTabsWithMemory(projectCode, mainItems) {
        const mainTabsDiv = document.getElementById('mainTabs');
        const subTabsWrapper = document.getElementById('subTabsWrapper');
        const subTabsDiv = document.getElementById('subTabs');
        const iframe = document.getElementById('contentIframe');
        const loading = document.getElementById('loadingOverlay');

        function showLoading() { loading.style.display = 'flex'; }
        function hideLoading() { loading.style.display = 'none'; }
        
        function loadUrl(url) {
            if (!url) {
                iframe.srcdoc = "<html><body style='background:var(--bg-body);color:var(--text-header);display:flex;align-items:center;justify-content:center;font-family:sans-serif;'>⚠️ 無效連結或無內容</body></html>";
                hideLoading();
                return;
            }
            showLoading();
            iframe.onload = () => { hideLoading(); };
            iframe.onerror = () => {
                iframe.srcdoc = `<html><body style='background:var(--bg-body);color:var(--text-header);display:flex;align-items:center;justify-content:center;'>⚠️ 無法載入連結</body></html>`;
                hideLoading();
            };
            iframe.src = url;
        }

        // 儲存主按鈕與子按鈕的引用映射，方便後續觸發點擊
        const mainButtons = new Map(); // key: mainItemId, value: button element
        const subButtonsMap = new Map(); // key: subItemId, value: button element (動態重建時會重新填充)

        // 清空容器
        mainTabsDiv.innerHTML = '';
        
        // 建立主頁籤按鈕
        mainItems.forEach((item) => {
            const btn = document.createElement('button');
            btn.className = 'viewer-tab';
            btn.textContent = item.name;
            btn.dataset.id = item.id;
            btn.dataset.link = item.link || '';
            mainButtons.set(item.id, btn);
            
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                // 切換主選單 active 狀態
                document.querySelectorAll('.viewer-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                // 儲存記憶：主頁籤 id
                saveMainTabMemory(projectCode, item.id);
                
                // 判斷是否有直接連結
                if (item.link && item.link.trim()) {
                    // 有直接連結: 隱藏子頁籤容器，載入連結，並清除子頁籤記憶 (因為沒有子頁籤可選)
                    subTabsWrapper.style.display = 'none';
                    subTabsDiv.innerHTML = '';
                    loadUrl(item.link);
                    // 清除子頁籤記憶 (因為主項目是直接連結，不具備子頁籤)
                    saveSubTabMemory(projectCode, null);
                } else {
                    // 沒有直接連結: 顯示子選單
                    const subItems = item.subItems || [];
                    subTabsWrapper.style.display = 'block';
                    subTabsDiv.innerHTML = '';
                    subButtonsMap.clear();
                    
                    if (subItems.length === 0) {
                        // 無子項目，顯示提示並清空 iframe
                        const emptyMsg = document.createElement('div');
                        emptyMsg.style.padding = '8px';
                        emptyMsg.style.color = 'var(--text-sub-tab-inactive)';
                        emptyMsg.innerText = '📂 此主項目無子項目';
                        subTabsDiv.appendChild(emptyMsg);
                        loadUrl(null);
                        saveSubTabMemory(projectCode, null);
                    } else {
                        // 建立子項目按鈕
                        let firstValidSub = null;
                        subItems.forEach(sub => {
                            const subBtn = document.createElement('button');
                            subBtn.className = 'viewer-sub-tab';
                            subBtn.textContent = sub.name;
                            subBtn.dataset.id = sub.id;
                            subBtn.dataset.link = sub.link || '';
                            subButtonsMap.set(sub.id, subBtn);
                            
                            subBtn.addEventListener('click', (e) => {
                                e.stopPropagation();
                                // 移除其他子項目的 active 狀態
                                document.querySelectorAll('.viewer-sub-tab').forEach(s => s.classList.remove('active'));
                                subBtn.classList.add('active');
                                // 記憶子頁籤 id
                                saveSubTabMemory(projectCode, sub.id);
                                // 載入子頁籤連結
                                loadUrl(sub.link);
                            });
                            subTabsDiv.appendChild(subBtn);
                            if (!firstValidSub) firstValidSub = subBtn;
                        });
                        
                        // 嘗試恢復此主項目下的子頁籤記憶
                        const rememberedSubId = getSubTabMemory(projectCode);
                        let targetSubBtn = null;
                        if (rememberedSubId && subButtonsMap.has(rememberedSubId)) {
                            targetSubBtn = subButtonsMap.get(rememberedSubId);
                        }
                        if (targetSubBtn) {
                            // 點擊記憶的子頁籤
                            targetSubBtn.click();
                        } else if (firstValidSub) {
                            // 無記憶或記憶無效，點擊第一個
                            firstValidSub.click();
                        } else {
                            loadUrl(null);
                        }
                    }
                }
            });
            mainTabsDiv.appendChild(btn);
        });
        
        // 主頁籤記憶恢復邏輯
        const rememberedMainId = getMainTabMemory(projectCode);
        let targetMainBtn = null;
        if (rememberedMainId && mainButtons.has(rememberedMainId)) {
            targetMainBtn = mainButtons.get(rememberedMainId);
        }
        
        if (targetMainBtn) {
            // 如果找到記憶的主頁籤，直接觸發點擊事件（會自動處理子頁籤邏輯）
            targetMainBtn.click();
        } else {
            // 否則點擊第一個主頁籤（若存在）
            const firstMain = mainTabsDiv.querySelector('.viewer-tab');
            if (firstMain) {
                firstMain.click();
            } else {
                // 完全沒有任何主頁籤，顯示空白訊息
                subTabsWrapper.style.display = 'none';
                loadUrl(null);
            }
        }
    }

    // 關於彈窗（優化樣式，適應主題色）
    function showAboutModal() {
        // 避免重複產生多個 modal
        if (document.querySelector('.modal')) return;
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>📌 關於本系統</h3>
                <div class="logo">
                    <span style="font-weight:500;">🤖 DeepSeek</span>
                    <span style="font-weight:500;">🔥 Firebase</span>
                </div>
                <p>構想：<a href="mailto:jumper.hsu@gmail.com" style="color: var(--bg-tab-active);">jumper.hsu@gmail.com</a></p>
                <p>設計：DeepSeek</p>
                <p>資料庫：Firebase</p>
                <p>版次：20260326.03 (智慧記憶頁籤及子頁籤)</p>
                <button id="closeAboutBtn" class="outline" style="margin-top: 16px;">關閉</button>
            </div>
        `;
        document.body.appendChild(modal);
        const closeBtn = document.getElementById('closeAboutBtn');
        if (closeBtn) closeBtn.onclick = () => modal.remove();
        // 點擊背景關閉
        modal.addEventListener('click', (e) => {
            if (e.target === modal) modal.remove();
        });
    }
    document.getElementById('aboutBtn').addEventListener('click', showAboutModal);
</script>
</body>
</html>
