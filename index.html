<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專案管理系統</title>
    <style>
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: #f5f7fb;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .loading {
            text-align: center;
            color: #2c3e66;
            font-size: 1.2rem;
        }
        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #e2e8f0;
            border-top-color: #2c3e66;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div class="loading">
    <div class="spinner"></div>
    <div>重新導向中...</div>
</div>
<script>
    (function() {
        const params = new URLSearchParams(window.location.search);
        const projectCode = params.get('projectCode');
        if (projectCode && projectCode.trim()) {
            window.location.href = `view.html?projectCode=${encodeURIComponent(projectCode)}`;
        } else {
            window.location.href = 'edit.html';
        }
    })();
</script>
</body>
</html>
